<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="hearts-bg" id="floating-hearts"></div>

  <main class="app-shell">
    <section class="screen active" id="screen-splash">
      <div class="panel splash-panel">
        <div class="image-wrap pixel-wrap">
          <img src="assets/pixelCouple.png" alt="Pixel couple" class="pixel-image" />
        </div>
        <p class="eyebrow">turn your volume up 🔊</p>
        <h1 class="main-title">for you</h1>
        <p class="subtext">tap to begin</p>
        <button class="primary-button" id="start-btn">Start</button>
      </div>
    </section>

    <section class="screen" id="screen-hearts">
      <div class="panel hearts-panel">
        <h2 class="script-title">Happy late Valentine's Day<br />and happy birthday my love</h2>
        <p class="small-note">press the hearts for a surprise</p>
        <div class="hearts-grid" id="hearts-grid"></div>
        <button class="ghost-button" data-next="screen-letter">Continue ↓</button>
      </div>
    </section>

    <section class="screen" id="screen-letter">
      <div class="panel letter-panel">
        <h2 class="script-title">A letter for you</h2>
        <div class="letter-card">
          <div class="letter-text" id="letter-text"></div>
          <span class="cursor" id="letter-cursor">|</span>
        </div>
        <div class="button-row">
          <button class="ghost-button" id="skip-letter">Skip typing</button>
          <button class="primary-button" data-next="screen-surprise">Continue</button>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-surprise">
      <div class="panel surprise-panel" id="surprise-panel">
        <div id="surprise-locked">
          <p class="script-subtitle">Tap to unlock something special…</p>
          <button class="primary-button" id="unlock-btn">Unlock</button>
        </div>
        <div class="hidden reveal-block" id="surprise-reveal">
          <h2 class="script-title">Our Story 💕</h2>
          <p class="small-note">Every moment led here.</p>
          <button class="primary-button" data-next="screen-timeline">Relive it →</button>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-timeline">
      <div class="panel timeline-panel">
        <div class="timeline-content fade-in" id="timeline-content">
          <p class="timeline-date" id="timeline-date"></p>
          <div class="timeline-media-wrap" id="timeline-media-wrap"></div>
          <p class="timeline-text" id="timeline-text"></p>
        </div>
        <div class="timeline-dots" id="timeline-dots"></div>
        <button class="ghost-button" id="timeline-next">Tap to continue</button>
      </div>
    </section>

    <section class="screen dark-screen" id="screen-birthday">
      <div class="panel birthday-panel birthday-dark" id="birthday-panel"></div>
    </section>
<video id="birthdayVideo" src="assets/birthday.mp4" controls playsinline></video>
    <section class="screen" id="screen-playlist">
      <div class="panel playlist-panel">
        <h2 class="script-title">I made this for you.</h2>
        <a class="spotify-button" id="playlist-link" href="https://open.spotify.com/playlist/6A16lhvYUICTg0dIWcRZ85?si=c68317eb8e0840cd" target="_blank" rel="noopener noreferrer">Open Playlist 🎵</a>
        <p class="small-note">This is the end :)</p>
      </div>
    </section>
  </main>

<audio id="splashAudio" src="assets/splash.mp3"></audio>
<audio id="heartsAudio" src="assets/hearts.mp3" loop></audio>

  <script src="script.js"></script>
</body>
</html>
